<script>
firebase.initializeApp({apiKey:"AIzaSyAP4pLIRiHIXGAR1AWVvRymd6yHnVmRV5Q",authDomain:"austin-tennis.firebaseapp.com",databaseURL:"https://austin-tennis-default-rtdb.firebaseio.com",projectId:"austin-tennis",storageBucket:"austin-tennis.firebasestorage.app",messagingSenderId:"652090047111",appId:"1:652090047111:web:b1795d9f47a70edbaa5622"});
let showSignIn=false,signInError="",signInLoading=false,dataLoaded=false;
firebase.auth().onAuthStateChanged(user=>{showSignIn=!user;if(signInLoading&&user)signInLoading=false;render();});
const db=firebase.database(),mRef=db.ref("match"),hRef=db.ref("history"),nRef=db.ref("notifications");

const VAPID_KEY="BJQvLm_-T8KLwHZdZQu3aV0_FwKKsmybA4lh8jopn6kMHWOA4dMQfXGQqNXIlvmmZnQQv0jFhRQ0WoF3Ul_H8LM";

      .catch(()=>{});

const PL=["0","15","30","40"],TAGS=["Ace","Unreturned serve","Double fault","FH winner","BH winner","Dropshot winner","Volley winner","Overhead winner","Unforced error","Forced error","No tag"];
const TC={"Ace":"ace","Unreturned serve":"ace","Double fault":"df","FH winner":"wn","BH winner":"wn","Dropshot winner":"wn","Volley winner":"wn","Overhead winner":"wn","Unforced error":"er","Forced error":"er","No tag":"sk"};
const HB_INT=10000,HB_TO=35000;
const myId="s_"+Math.random().toString(36).slice(2,10);

// ── Player 1 identity ────────────────────────────────────────────────────────
const AUSTIN_NAME="Austin Mats";
const AUSTIN_WTN=""; // default; overridden by localStorage / in-app setup

const DEF={player1:AUSTIN_NAME,player2:"Opponent",sets:[{games:[0,0],tiebreak:false,tiebreakPoints:[0,0]}],currentGame:[0,0],serving:0,matchFormat:3,gamesPerSet:6,thirdSetFormat:"regular",noAd:false,matchOver:false,winner:null,lastUpdated:null,matchStarted:false,matchStartTime:null,pointLog:[],stateHistory:[],activeScorer:null,scorerHeartbeat:null,scorerId:null,indoor:false,location:"",weather:null,p1Wtn:AUSTIN_WTN,p2Wtn:""};

let S=JSON.parse(JSON.stringify(DEF));
let isAdmin=false,showSetup=true,confirmReset=false,confirmFinalize=false,confirmDeleteKey=null;
let pendingPoint=null,viewTab="live",tagsEnabled=true,scorerName="";
let mHist=[],hKeys=[],viewHist=null,hbTimer=null,timerInt=null;
let showNamePrompt=false,showScorerWarn=false;
let notifSettings={game:true,set:true,match:true};
try{const _ns=localStorage.getItem('atNotif');if(_ns)notifSettings=JSON.parse(_ns)}catch(e){}
try{const _w=localStorage.getItem('atP1Wtn');if(_w)DEF.p1Wtn=_w}catch(e){}
let weatherLoading=false,gpsCoords=null;
let locSuggestions=[],locDropdown=false,_locTimer=null;
const clientStartTime=Date.now();

function save(ns){S=ns;mRef.set(ns);render()}
function snap(){const c=JSON.parse(JSON.stringify(S));delete c.stateHistory;if(!S.stateHistory)S.stateHistory=[];S.stateHistory.push(c);if(S.stateHistory.length>200)S.stateHistory.shift()}

mRef.on("value",s=>{dataLoaded=true;const v=s.val();if(v){S=v;if(!S.sets)S.sets=[{games:[0,0],tiebreak:false,tiebreakPoints:[0,0]}];if(!S.pointLog)S.pointLog=[];if(!S.stateHistory)S.stateHistory=[];if(S.matchStarted)showSetup=false}startTimer();render()});
hRef.on("value",s=>{const v=s.val();if(v){hKeys=Object.keys(v);const entries=Object.entries(v).map(([k,val])=>({_key:k,...val}));mHist=entries.sort((a,b)=>(b.date||"").localeCompare(a.date||""))}else{hKeys=[];mHist=[]}render()});
nRef.orderByChild("ts").limitToLast(5).on("child_added",snap=>{const v=snap.val();if(!v||!v.ts)return;if(new Date(v.ts).getTime()<clientStartTime-2000)return;dispNotif(v)});

function startTimer(){clearInterval(timerInt);if(S.matchStarted&&!S.matchOver&&S.matchStartTime){timerInt=setInterval(()=>{const el=document.getElementById("mtimer");if(el)el.textContent=getEl()},1000)}}
function getEl(){if(!S.matchStartTime)return"0:00";const d=Math.floor((Date.now()-new Date(S.matchStartTime).getTime())/1000),m=Math.floor(d/60),s=d%60;return m+":"+(s<10?"0":"")+s}

function csw(s,g){const[a,b]=s.games;if(a>=g&&a-b>=2)return 0;if(b>=g&&b-a>=2)return 1;if(a===g+1)return 0;if(b===g+1)return 1;return -1}
function cs(){return S.sets[S.sets.length-1]}
function isSTB(n){return n.matchFormat===3&&n.sets.length===3&&n.thirdSetFormat==="supertb"&&n.sets[2].tiebreak}
function scorerActive(){if(!S.activeScorer||!S.scorerHeartbeat)return false;return(Date.now()-new Date(S.scorerHeartbeat).getTime())<HB_TO}
function isMe(){return S.scorerId===myId}

function startHB(){clearInterval(hbTimer);if(!isAdmin)return;const beat=()=>{S.activeScorer=scorerName||"Scorer";S.scorerHeartbeat=new Date().toISOString();S.scorerId=myId;mRef.update({activeScorer:S.activeScorer,scorerHeartbeat:S.scorerHeartbeat,scorerId:S.scorerId})};beat();hbTimer=setInterval(beat,HB_INT)}
function stopHB(){clearInterval(hbTimer);mRef.update({activeScorer:null,scorerHeartbeat:null,scorerId:null});}

function bsp(pi){if(S.matchOver)return;if(tagsEnabled){pendingPoint={player:pi};render();return}dsp(pi,"No tag")}
function csp(tag){if(!pendingPoint)return;dsp(pendingPoint.player,tag);pendingPoint=null}
function getTagsFor(pi){const isServing=S.serving===pi;if(isServing)return TAGS.filter(t=>t!=="Double fault");return TAGS.filter(t=>t!=="Ace"&&t!=="Unreturned serve")}

function dsp(pi,tag){
  snap();const ns=JSON.parse(JSON.stringify(S));const c=ns.sets[ns.sets.length-1];
  if(!ns.pointLog)ns.pointLog=[];
  ns.pointLog.push({player:pi,tag:tag,set:ns.sets.length-1,serving:ns.serving,onServe:ns.serving===pi,gp:[...ns.currentGame],gg:[...c.games],tb:c.tiebreak,tbp:[...c.tiebreakPoints],stb:isSTB(ns)});
  if(isSTB(ns)){c.tiebreakPoints[pi]++;const[a,b]=c.tiebreakPoints;const t=a+b;if(t===1||(t>1&&(t-1)%2===0))ns.serving=ns.serving===0?1:0;if(a>=10&&a-b>=2){c.games[0]=1;c.games[1]=0;fset(ns)}else if(b>=10&&b-a>=2){c.games[0]=0;c.games[1]=1;fset(ns)}else{ns.lastUpdated=new Date().toISOString();save(ns)}return}
  if(c.tiebreak){c.tiebreakPoints[pi]++;const[a,b]=c.tiebreakPoints;const t=a+b;if(t===1||(t>1&&(t-1)%2===0))ns.serving=ns.serving===0?1:0;if(a>=7&&a-b>=2){c.games[0]=ns.gamesPerSet+1;c.games[1]=ns.gamesPerSet;fset(ns)}else if(b>=7&&b-a>=2){c.games[0]=ns.gamesPerSet;c.games[1]=ns.gamesPerSet+1;fset(ns)}else{ns.lastUpdated=new Date().toISOString();save(ns)}return}
  const[a,b]=ns.currentGame;
  if(a>=3&&b>=3){if(ns.noAd){wg(ns,pi);return}if(pi===0){if(a===4){wg(ns,0);return}else if(b===4)ns.currentGame=[3,3];else ns.currentGame[0]=4}else{if(b===4){wg(ns,1);return}else if(a===4)ns.currentGame=[3,3];else ns.currentGame[1]=4}}
  else{ns.currentGame[pi]++;if(ns.currentGame[pi]>=4){wg(ns,pi);return}}
  ns.lastUpdated=new Date().toISOString();save(ns);
}

function wg(ns,pi){const c=ns.sets[ns.sets.length-1];c.games[pi]++;ns.currentGame=[0,0];ns.serving=ns.serving===0?1:0;const wn=pi===0?ns.player1:ns.player2;const sc=c.games[0]+'-'+c.games[1];if(c.games[0]===ns.gamesPerSet&&c.games[1]===ns.gamesPerSet){c.tiebreak=true;c.tiebreakPoints=[0,0];sendNotif('game','Game: '+wn,ns.player1+' '+sc+' '+ns.player2);ns.lastUpdated=new Date().toISOString();save(ns);return}if(csw(c,ns.gamesPerSet)>=0)fset(ns);else{sendNotif('game','Game: '+wn,ns.player1+' '+sc+' '+ns.player2);ns.lastUpdated=new Date().toISOString();save(ns)}}

function fset(ns){const nd=Math.ceil(ns.matchFormat/2);let w=[0,0];ns.sets.forEach((s,i)=>{if(i===2&&ns.thirdSetFormat==="supertb"&&s.tiebreak){if(s.games[0]>s.games[1])w[0]++;else if(s.games[1]>s.games[0])w[1]++}else{const r=csw(s,ns.gamesPerSet);if(r>=0)w[r]++}});const curS=ns.sets[ns.sets.length-1];const setWr=curS.games[0]>curS.games[1]?0:1;const setWrN=setWr===0?ns.player1:ns.player2;const setNum=ns.sets.length;const fullSc=ns.sets.map(s=>s.games[0]+'-'+s.games[1]).join(' ');if(w[0]>=nd){ns.matchOver=true;ns.winner=0;sendNotif('match','🏆 '+ns.player1+' wins!',fullSc)}else if(w[1]>=nd){ns.matchOver=true;ns.winner=1;sendNotif('match','🏆 '+ns.player2+' wins!',fullSc)}else{sendNotif('set',setWrN+' wins Set '+setNum,curS.games[0]+'-'+curS.games[1]);if(ns.matchFormat===3&&ns.sets.length===2&&ns.thirdSetFormat==="supertb")ns.sets.push({games:[0,0],tiebreak:true,tiebreakPoints:[0,0]});else ns.sets.push({games:[0,0],tiebreak:false,tiebreakPoints:[0,0]})}ns.currentGame=[0,0];ns.lastUpdated=new Date().toISOString();save(ns)}

function gs(pi){const c=cs();if(c.tiebreak)return c.tiebreakPoints[pi].toString();const p=S.currentGame[pi],o=S.currentGame[pi===0?1:0];if(p>=3&&o>=3){if(S.noAd)return"40";if(p===o)return"40";return p>o?"AD":"–"}return PL[p]||p.toString()}

function cst(log){if(!log||!log.length)return null;const s={p1:{aces:0,df:0,fhw:0,bhw:0,vw:0,ohw:0,ue:0,fe:0,sw:0,st:0,rw:0,rt:0,tp:0},p2:{aces:0,df:0,fhw:0,bhw:0,vw:0,ohw:0,ue:0,fe:0,sw:0,st:0,rw:0,rt:0,tp:0}};log.forEach(pt=>{const pk=pt.player===0?"p1":"p2",ok=pt.player===0?"p2":"p1";s[pk].tp++;if(pt.tag==="Ace")s[pk].aces++;if(pt.tag==="Double fault")s[ok].df++;if(pt.tag==="FH winner")s[pk].fhw++;if(pt.tag==="BH winner")s[pk].bhw++;if(pt.tag==="Volley winner")s[pk].vw++;if(pt.tag==="Overhead winner")s[pk].ohw++;if(pt.tag==="Unforced error")s[ok].ue++;if(pt.tag==="Forced error")s[ok].fe++;if(pt.serving===pt.player){s[pk].st++;s[pk].sw++;s[ok].rt++}else{s[pk].rt++;s[pk].rw++;s[ok].st++}});return s}
function pct(n,d){return d===0?"0%":Math.round(n/d*100)+"%"}
function sR(l,v1,v2){return`<div class="stw"><div class="stv p1">${v1}</div><div class="stl">${l}</div><div class="stv p2">${v2}</div></div>`}
function rStats(log,p1,p2){const s=cst(log);if(!s)return'<div style="color:var(--t3);font-size:13px;padding:12px">No point data.</div>';const tw=p=>p.fhw+p.bhw+p.vw+p.ohw+p.aces;return`<div class="stw" style="padding:4px 0 8px;border-bottom:1px solid var(--brd)"><div class="stv p1" style="font-size:12px;font-weight:700">${e(p1)}</div><div class="stl"></div><div class="stv p2" style="font-size:12px;font-weight:700">${e(p2)}</div></div><div class="sts"><div class="stt">Serve</div>${sR("Aces",s.p1.aces,s.p2.aces)}${sR("Double Faults",s.p1.df,s.p2.df)}${sR("Pts Won on Serve",s.p1.sw?s.p1.sw+" ("+pct(s.p1.sw,s.p1.st)+")":"0",s.p2.sw?s.p2.sw+" ("+pct(s.p2.sw,s.p2.st)+")":"0")}${sR("Pts Won on Return",s.p1.rw?s.p1.rw+" ("+pct(s.p1.rw,s.p1.rt)+")":"0",s.p2.rw?s.p2.rw+" ("+pct(s.p2.rw,s.p2.rt)+")":"0")}</div><div class="sts"><div class="stt">Winners</div>${sR("Forehand",s.p1.fhw,s.p2.fhw)}${sR("Backhand",s.p1.bhw,s.p2.bhw)}${sR("Volley",s.p1.vw,s.p2.vw)}${sR("Overhead",s.p1.ohw,s.p2.ohw)}${sR("Total Winners",tw(s.p1),tw(s.p2))}</div><div class="sts"><div class="stt">Errors</div>${sR("Unforced Errors",s.p1.ue,s.p2.ue)}${sR("Forced Errors",s.p1.fe,s.p2.fe)}</div><div class="sts"><div class="stt">Total</div>${sR("Points Won",s.p1.tp,s.p2.tp)}</div>`}

const WMO={0:'☀️ Clear',1:'🌤 Mostly clear',2:'⛅ Partly cloudy',3:'☁️ Overcast',45:'🌫 Foggy',48:'🌫 Icy fog',51:'🌦 Drizzle',53:'🌦 Drizzle',55:'🌧 Drizzle',61:'🌧 Light rain',63:'🌧 Rain',65:'🌧 Heavy rain',71:'🌨 Light snow',73:'🌨 Snow',75:'🌨 Heavy snow',80:'🌦 Showers',81:'🌧 Showers',82:'⛈ Showers',95:'⛈ Thunderstorm',96:'⛈ Thunderstorm',99:'⛈ Thunderstorm'};

async function _fetchWeather(lat,lon){
  try{const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&temperature_unit=fahrenheit`);const d=await r.json();const cur=d.current;S.weather={temp:Math.round(cur.temperature_2m),code:cur.weathercode}}catch(e){S.weather=null}
}
function getGPS(){
  locDropdown=false;locSuggestions=[];
  if(!navigator.geolocation)return;
  weatherLoading=true;render();
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude:lat,longitude:lon}=pos.coords;gpsCoords={lat,lon};
    try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);const d=await r.json();const a=d.address||{};S.location=[a.city||a.town||a.village||'',a.state||''].filter(Boolean).join(', ')}catch(e){S.location=`${lat.toFixed(3)}, ${lon.toFixed(3)}`}
    await _fetchWeather(lat,lon);weatherLoading=false;render();
  },()=>{weatherLoading=false;render()});
}
function onLocInput(v){
  clearTimeout(_locTimer);locDropdown=false;locSuggestions=[];
  if(!v||v.trim().length<2){render();return}
  _locTimer=setTimeout(()=>searchLocation(v.trim()),350);
}
async function searchLocation(q){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1`);
    const d=await r.json();
    locSuggestions=d.map(item=>{const a=item.address||{};const parts=[a.city||a.town||a.village||a.municipality||a.county||'',a.state||a.province||'',a.country||''].filter(Boolean);return{label:parts.join(', ')||item.display_name,lat:parseFloat(item.lat),lon:parseFloat(item.lon)}});
    locDropdown=locSuggestions.length>0;
  }catch(e){locSuggestions=[];locDropdown=false}
  render();
}
async function selectLocation(i){
  const s=locSuggestions[i];if(!s)return;
  S.location=s.label;locDropdown=false;locSuggestions=[];
  gpsCoords={lat:s.lat,lon:s.lon};
  const inp=document.getElementById('iloc');if(inp)inp.value=S.location;
  weatherLoading=true;render();
  await _fetchWeather(s.lat,s.lon);
  weatherLoading=false;render();
}

function fmtPtScore(pt){
  if(!pt.gp)return'';
  let g;
  if(pt.stb||pt.tb){g=(pt.tbp||[0,0])[0]+'-'+(pt.tbp||[0,0])[1]}
  else{const[a,b]=pt.gp;const fa=a>=3&&b>=3?(a>b?'AD':a===b?'40':'–'):(PL[a]||a);const fb=b>=3&&a>=3?(b>a?'AD':b===a?'40':'–'):(PL[b]||b);g=fa+'-'+fb}
  const[g0,g1]=pt.gg||[0,0];
  return`${g} · ${g0}-${g1} · S${(pt.set||0)+1}`
}

  const app=document.getElementById("app");const n=S.sets.length;const gc=`1fr repeat(${n},44px) 58px`;

  // Auth gate
  if(showSignIn){app.innerHTML=`${titleHtml()}<div class="card sc"><div style="text-align:center;margin-bottom:24px"><div style="font-size:13px;letter-spacing:3px;color:var(--t3);font-weight:700">SIGN IN TO CONTINUE</div></div><button class="go" style="background:#fff;color:#1a1a1a;letter-spacing:0;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px" onclick="signInWithGoogle()">${GSVG}${signInLoading?'Signing in…':'Sign in with Google'}</button><div style="display:flex;align-items:center;gap:10px;margin:16px 0"><div style="flex:1;height:1px;background:var(--brd)"></div><span style="font-size:10px;color:var(--t3);letter-spacing:2px">OR</span><div style="flex:1;height:1px;background:var(--brd)"></div></div><label class="fl">EMAIL</label><input class="fi" id="si-email" type="email" placeholder="Email" autocomplete="username"><div class="sp"></div><label class="fl">PASSWORD</label><input class="fi" id="si-pass" type="password" placeholder="Password" autocomplete="current-password">${signInError?`<div style="color:var(--red);font-size:13px;margin-top:10px;text-align:center">${e(signInError)}</div>`:''}<button class="go" style="opacity:0.4;pointer-events:none;margin-top:12px" id="si-go" onclick="signInWithPassword(document.getElementById('si-email').value.trim(),document.getElementById('si-pass').value)">SIGN IN</button></div>`;setTimeout(()=>{const em=document.getElementById('si-email'),pw=document.getElementById('si-pass'),btn=document.getElementById('si-go');function chk(){btn.style.opacity=(em.value.trim()&&pw.value)?'1':'0.4';btn.style.pointerEvents=(em.value.trim()&&pw.value)?'auto':'none'}if(em)em.oninput=chk;if(pw)pw.oninput=chk;if(em)em.focus()},0);return}
  if(!dataLoaded){app.innerHTML=`<div class="tac" style="margin-top:80px"><div style="color:var(--t3);font-size:14px;letter-spacing:3px">LOADING...</div></div>`;return}

  // Name prompt
  if(showNamePrompt){app.innerHTML=`${titleHtml()}<div class="card sc"><div style="text-align:center;margin-bottom:20px;font-size:13px;letter-spacing:3px;color:var(--ac);font-weight:700">ENTER SCORER MODE</div><label class="fl">YOUR NAME</label><input class="fi" id="sn-input" value="${e(scorerName)}" placeholder="Enter your name"><button class="go" style="opacity:0.4;pointer-events:none;margin-top:12px" id="sn-go" onclick="enterScorer(document.getElementById('sn-input').value.trim())">CONTINUE</button><button class="sm" style="width:100%;margin-top:12px" onclick="showNamePrompt=false;render()">CANCEL</button></div>`;setTimeout(()=>{const inp=document.getElementById('sn-input'),btn=document.getElementById('sn-go');if(inp){inp.oninput=()=>{const v=inp.value.trim();btn.style.opacity=v?'1':'0.4';btn.style.pointerEvents=v?'auto':'none'};inp.focus()}},0);return}

  // Scorer warning
  if(showScorerWarn){app.innerHTML=`${titleHtml()}<div class="card sc"><div style="text-align:center;margin-bottom:16px"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">Active Scorer Detected</div><div style="font-size:14px;color:var(--t2);line-height:1.5"><strong style="color:var(--ac)">${e(S.activeScorer)}</strong> is currently scoring this match. Continuing may cause conflicts.</div></div><label class="fl" style="margin-top:20px">YOUR NAME</label><input class="fi" id="sw-input" value="${e(scorerName)}" placeholder="Enter your name"><button class="go warn" style="opacity:0.4;pointer-events:none;margin-top:12px" id="sw-go" onclick="enterScorer(document.getElementById('sw-input').value.trim())">TAKE OVER SCORING</button><button class="sm" style="width:100%;margin-top:12px" onclick="showScorerWarn=false;render()">GO BACK</button></div>`;setTimeout(()=>{const inp=document.getElementById('sw-input'),btn=document.getElementById('sw-go');if(inp){inp.oninput=()=>{const v=inp.value.trim();btn.style.opacity=v?'1':'0.4';btn.style.pointerEvents=v?'auto':'none'};inp.focus()}},0);return}

  // History detail
  if(viewHist){const m=viewHist;const hCtx=contextLine(m);app.innerHTML=`${titleHtml()}<div class="card" style="padding:24px 20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><button class="sm" onclick="viewHist=null;render()" style="flex:0;padding:8px 16px">← BACK</button><div style="font-size:11px;color:var(--t3)">${fd(m.date)}</div></div><div id="sxa" style="background:#0D1520;padding:16px;border-radius:12px"><div style="text-align:center;margin-bottom:16px"><div style="font-size:10px;letter-spacing:4px;color:var(--t3);font-weight:700;margin-bottom:4px">AUSTIN'S TENNIS</div><div style="font-size:16px;font-weight:700;margin-bottom:4px">${e(m.player1)}${m.p1Wtn?` <span style="font-size:11px;color:var(--ac)">${m.p1Wtn}</span>`:''} vs ${e(m.player2)}${m.p2Wtn?` <span style="font-size:11px;color:var(--blue)">${m.p2Wtn}</span>`:''}</div><div style="font-size:13px;color:var(--ac);font-weight:600">🏆 ${e(m.winner===0?m.player1:m.player2)} wins</div><div style="margin-top:4px;font-size:11px;color:var(--t3)">${m.noAd?"No-Ad":"Ad"} · ${m.gamesPerSet||6}g${m.thirdSetFormat==="supertb"?" · 3rd: STB":""}${m.matchDuration?" · "+m.matchDuration:""}</div>${hCtx?`<div style="margin-top:4px;font-size:11px;color:var(--t3)">${hCtx}</div>`:''}<div style="margin-top:8px;font-family:'JetBrains Mono',monospace;font-weight:600">${(m.sets||[]).map(s=>`<span style="margin:0 4px">${s.games[0]}-${s.games[1]}</span>`).join('')}</div></div>${rStats(m.pointLog,m.player1,m.player2)}</div><button class="sm b" style="width:100%;margin-top:14px" onclick="exportStats()">📸 EXPORT AS IMAGE</button></div>`;return}

  // Setup
  if(showSetup&&isAdmin){const s3=S.matchFormat===3;app.innerHTML=`${titleHtml()}<div class="card sc"><div style="text-align:center;margin-bottom:28px;font-size:13px;letter-spacing:3px;color:var(--ac);font-weight:700">MATCH SETUP</div><label class="fl">PLAYER 1</label><input class="fi" id="ip1" value="${e(S.player1)}" placeholder="Austin Mats" readonly style="opacity:.65;cursor:default"><div class="sp"></div><label class="fl">PLAYER 2</label><input class="fi" id="ip2" value="${e(S.player2)}" placeholder="Opponent"><div class="sp"></div><label class="fl">MATCH FORMAT</label><div class="pg">${[1,3].map(n=>`<button class="pl ${S.matchFormat===n?'a':''}" onclick="S.matchFormat=${n};render()">${n===1?'Single set':'Best of 3'}</button>`).join('')}</div><div class="sp"></div><label class="fl">GAMES PER SET</label><div class="pg">${[4,6].map(n=>`<button class="pl ${S.gamesPerSet===n?'a':''}" onclick="S.gamesPerSet=${n};render()">${n} games</button>`).join('')}</div>${s3?`<div class="sp"></div><label class="fl">3RD SET FORMAT</label><div class="pg"><button class="pl ${S.thirdSetFormat==='regular'?'a':''}" onclick="S.thirdSetFormat='regular';render()">Regular set</button><button class="pl ${S.thirdSetFormat==='supertb'?'a':''}" onclick="S.thirdSetFormat='supertb';render()">10-pt tiebreak</button></div>`:''}<div class="sp"></div><label class="fl">SCORING</label><div class="pg"><button class="pl ${!S.noAd?'a':''}" onclick="S.noAd=false;render()">Ad scoring</button><button class="pl ${S.noAd?'a':''}" onclick="S.noAd=true;render()">No-Ad</button></div><div class="sp"></div><label class="fl">FIRST SERVER</label><div class="pg">${[0,1].map(i=>`<button class="pl ${S.serving===i?'a':''}" onclick="S.serving=${i};render()">${e(i===0?S.player1||'P1':S.player2||'P2')}</button>`).join('')}</div><div class="sp"></div><label class="fl">VENUE</label><div class="pg"><button class="pl ${!S.indoor?'a':''}" onclick="S.indoor=false;render()">🌿 Outdoor</button><button class="pl ${S.indoor?'a':''}" onclick="S.indoor=true;render()">🏠 Indoor</button></div><div class="sp"></div><label class="fl">LOCATION</label><div style="display:flex;gap:8px;align-items:flex-start"><div style="flex:1;position:relative"><input class="fi" id="iloc" value="${e(S.location)}" placeholder="Search location..." style="margin-bottom:0" oninput="onLocInput(this.value)" autocomplete="off">${locDropdown&&locSuggestions.length?`<div class="loc-dd">${locSuggestions.map((s,i)=>`<div class="loc-opt" onclick="selectLocation(${i})">${e(s.label)}</div>`).join('')}</div>`:''}</div><button onclick="getGPS()" style="flex-shrink:0;padding:13px 14px;border:1px solid var(--brd-a);border-radius:12px;background:var(--acd);color:var(--ac);font-size:14px;cursor:pointer">${weatherLoading?'…':'📍'}</button></div>${S.weather?`<div style="margin-top:8px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2)">${wmoLabel(S.weather.code)} <strong>${S.weather.temp}°F</strong><button onclick="refreshWeather()" style="padding:3px 10px;border:1px solid var(--brd);border-radius:6px;background:none;color:var(--t3);font-size:11px;cursor:pointer">Refresh</button></div>`:''}<div class="sp"></div><label class="fl">WTN — PLAYER 1</label><input class="fi" id="iwtn1" type="number" step="0.1" min="1" max="40" value="${e(S.p1Wtn)}" placeholder="e.g. 14.2"><div class="sp"></div><label class="fl">WTN — PLAYER 2 <span style="font-weight:400;color:var(--t3)"><a href="https://worldtennisnumber.com/eng/player-search" target="_blank" style="color:var(--ac);text-decoration:none">Look up ↗</a></span></label><input class="fi" id="iwtn2" type="number" step="0.1" min="1" max="40" value="${e(S.p2Wtn)}" placeholder="e.g. 22.5"><button class="go" onclick="syncN();startMatch()">Start Match</button></div>${modeToggle()}`;setTimeout(()=>{const p1=document.getElementById('ip1'),p2=document.getElementById('ip2');if(p1)p1.oninput=()=>{S.player1=p1.value};if(p2)p2.oninput=()=>{S.player2=p2.value}},0);return}

  // No match (viewer)
  if(!S.matchStarted&&!isAdmin){app.innerHTML=`<div id="loading" class="hidden"></div>${titleHtml()}${tabsHtml()}${viewTab==='live'?`<div class="card idle"><div style="font-size:40px;margin-bottom:16px">🎾</div><div style="font-size:16px;font-weight:600;color:var(--t2);margin-bottom:6px">No match in progress</div><div style="font-size:13px;color:var(--t3)">Waiting for the scorer to start a match</div></div>`:''}${viewTab==='history'?histList():''}${viewTab==='settings'?settingsHtml():''}${modeToggle()}`;return}

  // Scoreboard
  const c=cs();const stb=isSTB(S);
  let statusH='';
  if(S.matchOver)statusH=`<div class="wb">🏆&nbsp; ${e(S.winner===0?S.player1:S.player2)} WINS</div>`;
  else{const lb=stb?'SUPER TIEBREAK':c.tiebreak?'TIEBREAK':'LIVE';const tm=S.lastUpdated?`<span class="st">${ft(S.lastUpdated)}</span>`:'';statusH=`<span class="ld"></span><span class="sl">${lb}</span>${tm}<span class="tmr" id="mtimer" style="margin-left:10px">${getEl()}</span>`}

  let rows='';
  for(let pi=0;pi<2;pi++){const isW=S.matchOver&&S.winner===pi,isSrv=S.serving===pi&&!S.matchOver,nm=pi===0?S.player1:S.player2;
    let sets='';for(let i=0;i<n;i++){const s=S.sets[i];const won=csw(s,S.gamesPerSet)===pi;const isCur=i===n-1&&!S.matchOver;const cl=won?'won':isCur?'cur':'';
      if(i===2&&S.thirdSetFormat==="supertb"&&s.tiebreak){sets+=`<div class="ss ${cl}">${s.tiebreakPoints[pi]}</div>`;continue}
      let sup='';if(s.tiebreak&&csw(s,S.gamesPerSet)>=0){const li=pi===csw(s,S.gamesPerSet)?(pi===0?1:0):pi;sup=`<sup>${s.tiebreakPoints[li]}</sup>`}
      sets+=`<div class="ss ${cl}">${s.games[pi]}${sup}</div>`}
    const pd=S.matchOver||stb?'':gs(pi);const po=S.matchOver||stb?'opacity:0':'';
    rows+=`<div class="sr ${isW?'w':''}" style="grid-template-columns:${gc}"><div class="pn ${isW?'pw':''}">${isSrv?SVB:''}<span>${e(nm)}</span>${isW?'<span style="margin-left:8px;font-size:14px">🏆</span>':''}</div>${sets}<div class="pc" style="${po}">${pd}</div></div>`}

  const ptL=stb?'STB':c.tiebreak?'TB':'PTS';
  let cH='';for(let i=0;i<n;i++){const l=i===2&&S.thirdSetFormat==='supertb'?'STB':(i+1).toString();cH+=`<div style="text-align:center;font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1.5px">${l}</div>`}
  const fL=S.matchFormat===1?'Single set':'Best of '+S.matchFormat;const scL=S.noAd?'No-Ad':'Ad';const t3=S.matchFormat===3&&S.thirdSetFormat==='supertb'?' · 3rd: STB':'';
  const ctxL=contextLine(S);
  const wtnRow=(S.p1Wtn||S.p2Wtn)?`<div style="display:grid;grid-template-columns:${gc};align-items:center;padding:6px 20px 0;border-top:1px solid var(--brd)"><div style="font-size:10px;color:var(--t3)">WTN ${S.p1Wtn?`<span style="color:var(--ac)">${S.p1Wtn}</span>`:''} / ${S.p2Wtn?`<span style="color:var(--blue)">${S.p2Wtn}</span>`:''}</div>${Array(n+1).fill('<div></div>').join('')}</div>`:'';

  let adm='';
  if(isAdmin&&!S.matchOver&&S.matchStarted){const cu=S.stateHistory&&S.stateHistory.length>0;
    adm=`<div class="mt22"><div class="scl">SCORE POINT</div><div class="flex g10"><button class="sb" onclick="bsp(0)">${e(S.player1)}</button><button class="sb" onclick="bsp(1)">${e(S.player2)}</button></div><div class="flex g10 mt10"><button class="sm" onclick="undo()" ${cu?'':'style="opacity:.3;pointer-events:none"'}>↩ UNDO</button><button class="sm b" onclick="sw()">🔄 SERVER</button></div><div class="flex g10 mt10"><button class="sm d" onclick="confirmReset=true;render()">RESET MATCH</button></div><div class="tr"><span class="trl">Point tagging</span><button class="tt ${tagsEnabled?'on':'off'}" onclick="tagsEnabled=!tagsEnabled;render()"><div class="td ${tagsEnabled?'on':'off'}"></div></button></div></div>`}
  else if(isAdmin&&S.matchOver){adm=`<div class="mt22 tac"><button class="go" style="margin-top:0;margin-bottom:10px" onclick="confirmFinalize=true;render()">SAVE & NEW MATCH</button><button class="sm" style="width:100%" onclick="doReset()">NEW MATCH (DON'T SAVE)</button></div>`}

  const lastPt=S.pointLog&&S.pointLog.length?S.pointLog[S.pointLog.length-1]:null;
  const lastPlayH=lastPt?`<div class="lp"><span style="font-size:11px">Last:</span><span style="font-size:13px;font-weight:600;color:${lastPt.player===0?'var(--ac)':'var(--blue)'}">${e(lastPt.player===0?S.player1:S.player2)}</span><span class="tb2 ${TC[lastPt.tag]||'sk'}" style="font-size:10px;padding:2px 9px;display:inline-block">${lastPt.tag}</span></div>`:'';

  app.innerHTML=`<div id="loading" class="hidden"></div>${titleHtml()}${tabsHtml()}
    ${viewTab==='live'?`<div class="tac" style="margin-bottom:16px">${statusH}${!isAdmin?scorerBadge():''}</div>${ctxL?`<div style="text-align:center;font-size:11px;color:var(--t3);margin-bottom:10px;margin-top:-8px">${ctxL}</div>`:''}<div class="card"><div class="sh" style="grid-template-columns:${gc}"><div style="font-size:11px;color:var(--t3);font-weight:600;letter-spacing:1px">${fL} · ${S.gamesPerSet}g · ${scL}${t3}</div>${cH}<div style="text-align:center;font-size:10px;color:var(--t2);font-weight:700;letter-spacing:1.5px">${ptL}</div></div>${rows}${wtnRow}${lastPlayH}</div>${adm}`:''}
    ${viewTab==='pbp'?pbpHtml():''}
    ${viewTab==='stats'?statsTabHtml():''}
    ${viewTab==='history'?histList():''}
    ${viewTab==='settings'?settingsHtml():''}
    ${modeToggle()}
    ${pendingPoint!==null?`<div class="ov"><div class="ob"><div style="font-size:18px;font-weight:700;margin-bottom:4px">How was the point won?</div><div style="font-size:13px;color:var(--t2);margin-bottom:4px">Point for <strong style="color:var(--ac)">${e(pendingPoint.player===0?S.player1:S.player2)}</strong></div><div class="tg">${getTagsFor(pendingPoint.player).map(t=>`<button class="tb2 ${TC[t]||''}" onclick="csp('${t}');render()">${t}</button>`).join('')}</div><button class="sm" style="width:100%;margin-top:8px" onclick="pendingPoint=null;render()">CANCEL</button></div></div>`:''}
    ${confirmReset?`<div class="ov" onclick="confirmReset=false;render()"><div class="ob" onclick="event.stopPropagation()"><div style="font-size:18px;font-weight:700;margin-bottom:8px">Reset Match?</div><div style="font-size:14px;color:var(--t2);margin-bottom:22px">This will clear all scores and return to setup.</div><div class="flex g10"><button class="sm" style="flex:1" onclick="event.stopPropagation();confirmReset=false;render()">CANCEL</button><button class="sm d" style="flex:1" onclick="event.stopPropagation();doReset()">RESET</button></div></div></div>`:''}
    ${confirmFinalize?`<div class="ov" onclick="confirmFinalize=false;render()"><div class="ob" onclick="event.stopPropagation()"><div style="font-size:18px;font-weight:700;margin-bottom:8px">Save Match?</div><div style="font-size:14px;color:var(--t2);margin-bottom:22px">This will save the match to history and start a new one.</div><div class="flex g10"><button class="sm" style="flex:1" onclick="event.stopPropagation();confirmFinalize=false;render()">CANCEL</button><button class="sm" style="flex:1;border-color:var(--brd-a);color:var(--ac)" onclick="event.stopPropagation();doFinalize()">SAVE</button></div></div></div>`:''}
    ${confirmDeleteKey?`<div class="ov" onclick="confirmDeleteKey=null;render()"><div class="ob" onclick="event.stopPropagation()"><div style="font-size:18px;font-weight:700;margin-bottom:8px">Delete Match?</div><div style="font-size:14px;color:var(--t2);margin-bottom:22px">This cannot be undone.</div><div class="flex g10"><button class="sm" style="flex:1" onclick="event.stopPropagation();confirmDeleteKey=null;render()">CANCEL</button><button class="sm d" style="flex:1" onclick="event.stopPropagation();doDel()">DELETE</button></div></div></div>`:''}`
}

function syncN(){
  S.player1=AUSTIN_NAME;
  const p2=document.getElementById('ip2');if(p2)S.player2=p2.value||'Opponent';
  const loc=document.getElementById('iloc');if(loc)S.location=loc.value.trim();
  const w1=document.getElementById('iwtn1'),w2=document.getElementById('iwtn2');
  if(w1){S.p1Wtn=w1.value.trim();if(S.p1Wtn)try{localStorage.setItem('atP1Wtn',S.p1Wtn)}catch(e){}}
  if(w2)S.p2Wtn=w2.value.trim();
}
</script>
</body>
</html>
