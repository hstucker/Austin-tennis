firebase.auth().getRedirectResult().catch(function(err){if(err&&err.code&&err.code!=='auth/cancelled-popup-request')alert('Sign-in failed: '+err.message);});

const VAPID_KEY="BJQvLm_-T8KLwHZdZQu3aV0_FwKKsmybA4lh8jopn6kMHWOA4dMQfXGQqNXIlvmmZnQQv0jFhRQ0WoF3Ul_H8LM";

  if(isSTB(ns)){c.tiebreakPoints[pi]++;const[a,b]=c.tiebreakPoints;const t=a+b;if(t===1||(t>1&&(t-1)%2===0))ns.serving=ns.serving===0?1:0;if(a>=10&&a-b>=2){c.games[0]=1;c.games[1]=0;fset(ns)}else if(b>=10&&b-a>=2){c.games[0]=0;c.games[1]=1;fset(ns)}else{ns.lastUpdated=new Date().toISOString();save(ns)}return}
  if(c.tiebreak){c.tiebreakPoints[pi]++;const[a,b]=c.tiebreakPoints;const t=a+b;if(t===1||(t>1&&(t-1)%2===0))ns.serving=ns.serving===0?1:0;if(a>=7&&a-b>=2){c.games[0]=ns.gamesPerSet+1;c.games[1]=ns.gamesPerSet;fset(ns)}else if(b>=7&&b-a>=2){c.games[0]=ns.gamesPerSet;c.games[1]=ns.gamesPerSet+1;fset(ns)}else{ns.lastUpdated=new Date().toISOString();save(ns)}return}
  const[a,b]=ns.currentGame;
  if(a>=3&&b>=3){if(ns.noAd){wg(ns,pi);return}if(pi===0){if(a===4){wg(ns,0);return}else if(b===4)ns.currentGame=[3,3];else ns.currentGame[0]=4}else{if(b===4){wg(ns,1);return}else if(a===4)ns.currentGame=[3,3];else ns.currentGame[1]=4}}
  else{ns.currentGame[pi]++;if(ns.currentGame[pi]>=4){wg(ns,pi);return}}
  ns.lastUpdated=new Date().toISOString();save(ns);
}

function wg(ns,pi){const c=ns.sets[ns.sets.length-1];c.games[pi]++;ns.currentGame=[0,0];ns.serving=ns.serving===0?1:0;const wn=pi===0?ns.player1:ns.player2;const sc=c.games[0]+'-'+c.games[1];if(c.games[0]===ns.gamesPerSet&&c.games[1]===ns.gamesPerSet){c.tiebreak=true;c.tiebreakPoints=[0,0];sendNotif('game','Game: '+wn,ns.player1+' '+sc+' '+ns.player2);ns.lastUpdated=new Date().toISOString();save(ns);return}if(csw(c,ns.gamesPerSet)>=0)fset(ns);else{sendNotif('game','Game: '+wn,ns.player1+' '+sc+' '+ns.player2);ns.lastUpdated=new Date().toISOString();save(ns)}}

function gs(pi){const c=cs();if(c.tiebreak)return c.tiebreakPoints[pi].toString();const p=S.currentGame[pi],o=S.currentGame[pi===0?1:0];if(p>=3&&o>=3){if(S.noAd)return"40";if(p===o)return"40";return p>o?"AD":"–"}return PL[p]||p.toString()}

const ET_SHORT={"Forehand":"FH","Backhand":"BH","Volley":"VL","Overhead":"OH","Other":"OT"};
function etShort(t){return ET_SHORT[t]||t}
function cst(log){if(!log||!log.length)return null;const mk=()=>({aces:0,unret:0,df:0,fhw:0,bhw:0,dsw:0,vw:0,ohw:0,ue:0,fe:0,ue_fh:0,ue_bh:0,ue_vl:0,ue_oh:0,ue_ot:0,fe_fh:0,fe_bh:0,fe_vl:0,fe_oh:0,fe_ot:0,sw:0,st:0,rw:0,rt:0,tp:0,s1in:0,s1fault:0,s2in:0});const s={p1:mk(),p2:mk()};log.forEach(pt=>{if(pt.isFault){const spk=pt.serving===0?"p1":"p2";s[spk].s1fault++;return}const pk=pt.player===0?"p1":"p2",ok=pt.player===0?"p2":"p1",spk=pt.serving===0?"p1":"p2",sn=pt.serveNum||1;s[pk].tp++;if(pt.tag==="Ace")s[pk].aces++;if(pt.tag==="Unreturned serve")s[pk].unret++;if(pt.tag==="Double fault")s[ok].df++;if(pt.tag==="FH winner")s[pk].fhw++;if(pt.tag==="BH winner")s[pk].bhw++;if(pt.tag==="Dropshot winner")s[pk].dsw++;if(pt.tag==="Volley winner")s[pk].vw++;if(pt.tag==="Overhead winner")s[pk].ohw++;if(pt.tag==="Unforced error"){s[ok].ue++;const et=pt.errorType||"";if(et==="Forehand")s[ok].ue_fh++;else if(et==="Backhand")s[ok].ue_bh++;else if(et==="Volley")s[ok].ue_vl++;else if(et==="Overhead")s[ok].ue_oh++;else if(et)s[ok].ue_ot++}if(pt.tag==="Forced error"){s[ok].fe++;const et=pt.errorType||"";if(et==="Forehand")s[ok].fe_fh++;else if(et==="Backhand")s[ok].fe_bh++;else if(et==="Volley")s[ok].fe_vl++;else if(et==="Overhead")s[ok].fe_oh++;else if(et)s[ok].fe_ot++}if(sn===1)s[spk].s1in++;else s[spk].s2in++;if(pt.serving===pt.player){s[pk].st++;s[pk].sw++;s[ok].rt++}else{s[pk].rt++;s[pk].rw++;s[ok].st++}});return s}
function pct(n,d){return d===0?"0%":Math.round(n/d*100)+"%"}

function rStats(log,p1,p2){const s=cst(log);if(!s)return'<div style="color:var(--t3);font-size:13px;padding:12px">No point data.</div>';const tw=p=>p.fhw+p.bhw+p.dsw+p.vw+p.ohw+p.aces;const p1pct=(n,d)=>d===0?"—":Math.round(n/d*100)+"%";const hasB=(t)=>s.p1[t+'_fh']||s.p2[t+'_fh']||s.p1[t+'_bh']||s.p2[t+'_bh']||s.p1[t+'_vl']||s.p2[t+'_vl']||s.p1[t+'_oh']||s.p2[t+'_oh']||s.p1[t+'_ot']||s.p2[t+'_ot'];const bRows=(t)=>{let r='';if(s.p1[t+'_fh']||s.p2[t+'_fh'])r+=sR("Forehand",s.p1[t+'_fh'],s.p2[t+'_fh']);if(s.p1[t+'_bh']||s.p2[t+'_bh'])r+=sR("Backhand",s.p1[t+'_bh'],s.p2[t+'_bh']);if(s.p1[t+'_vl']||s.p2[t+'_vl'])r+=sR("Volley",s.p1[t+'_vl'],s.p2[t+'_vl']);if(s.p1[t+'_oh']||s.p2[t+'_oh'])r+=sR("Overhead",s.p1[t+'_oh'],s.p2[t+'_oh']);if(s.p1[t+'_ot']||s.p2[t+'_ot'])r+=sR("Other",s.p1[t+'_ot'],s.p2[t+'_ot']);return r};const hasErrBreak=hasB('ue')||hasB('fe');const hasFaultData=s.p1.s1fault||s.p2.s1fault;const has2ndData=s.p1.s2in||s.p2.s2in||s.p1.df||s.p2.df;const s1p1=p1pct(s.p1.s1in,s.p1.s1in+s.p1.s1fault),s1p2=p1pct(s.p2.s1in,s.p2.s1in+s.p2.s1fault);const s2p1=p1pct(s.p1.s2in,s.p1.s2in+s.p1.df),s2p2=p1pct(s.p2.s2in,s.p2.s2in+s.p2.df);return`<div class="stw" style="padding:4px 0 8px;border-bottom:1px solid var(--brd)"><div class="stv p1" style="font-size:12px;font-weight:700">${e(p1)}</div><div class="stl"></div><div class="stv p2" style="font-size:12px;font-weight:700">${e(p2)}</div></div><div class="sts"><div class="stt">Serve</div>${sR("Aces",s.p1.aces,s.p2.aces)}${sR("Unreturned Serves",s.p1.unret,s.p2.unret)}${sR("Double Faults",s.p1.df,s.p2.df)}${hasFaultData?sR("1st Serve %",s1p1,s1p2):''}${has2ndData?sR("2nd Serve %",s2p1,s2p2):''}${sR("Pts Won on Serve",s.p1.sw?s.p1.sw+" ("+pct(s.p1.sw,s.p1.st)+")":"0",s.p2.sw?s.p2.sw+" ("+pct(s.p2.sw,s.p2.st)+")":"0")}${sR("Pts Won on Return",s.p1.rw?s.p1.rw+" ("+pct(s.p1.rw,s.p1.rt)+")":"0",s.p2.rw?s.p2.rw+" ("+pct(s.p2.rw,s.p2.rt)+")":"0")}</div><div class="sts"><div class="stt">Winners</div>${sR("Forehand",s.p1.fhw,s.p2.fhw)}${sR("Backhand",s.p1.bhw,s.p2.bhw)}${sR("Dropshot",s.p1.dsw,s.p2.dsw)}${sR("Volley",s.p1.vw,s.p2.vw)}${sR("Overhead",s.p1.ohw,s.p2.ohw)}${sR("Total Winners",tw(s.p1),tw(s.p2))}</div><div class="sts"><div class="stt" style="display:flex;justify-content:space-between;align-items:center">${hasErrBreak?`<button onclick="errExpanded=!errExpanded;render()" style="background:none;border:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;width:100%;padding:0;font-size:10px;letter-spacing:3px;color:var(--ac);font-weight:700;text-transform:uppercase">ERRORS <span style="font-size:14px;line-height:1;margin-left:4px">${errExpanded?'▲':'▼'}</span></button>`:'<span>ERRORS</span>'}</div>${sR("Unforced Errors",s.p1.ue,s.p2.ue)}${sR("Forced Errors",s.p1.fe,s.p2.fe)}${errExpanded&&hasErrBreak?`<div style="border-top:1px solid var(--brd);margin-top:4px;padding-top:2px"><div style="font-size:9px;letter-spacing:2px;color:var(--t3);padding:4px 0 2px;font-weight:700">UNFORCED</div>${bRows('ue')}<div style="font-size:9px;letter-spacing:2px;color:var(--t3);padding:6px 0 2px;font-weight:700">FORCED</div>${bRows('fe')}</div>`:''}</div><div class="sts"><div class="stt">Total</div>${sR("Points Won",s.p1.tp,s.p2.tp)}</div>`}

function fmtPtScore(pt){
  if(!pt.gp)return'';

  else{const[a,b]=pt.gp;const fa=a>=3&&b>=3?(a>b?'AD':a===b?'40':'–'):(PL[a]||a);const fb=b>=3&&a>=3?(b>a?'AD':b===a?'40':'–'):(PL[b]||b);g=fa+'-'+fb}

function pbpHtml(log,p1,p2){

  const pts=[...log].reverse();
  let h='<div class="card mt22">';
  pts.forEach(pt=>{
    const sc=fmtPtScore(pt);
    if(pt.isFault){const sname=pt.serving===0?p1:p2;h+=`<div class="pbpr" style="opacity:0.65"><span style="font-size:9px;color:var(--t3);width:14px;text-align:center;flex-shrink:0">●</span><span style="font-size:14px;font-weight:600;color:${pt.serving===0?'var(--ac)':'var(--blue)'}">${e(sname)}</span>${sc?`<span style="font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;flex:1;text-align:right;padding-right:8px">${sc}</span>`:'<span style="flex:1"></span>'}<span class="tb2 df" style="font-size:10px;padding:3px 9px;display:inline-block;flex-shrink:0">1st fault</span></div>`;return}
    const pname=pt.player===0?p1:p2;const tc=TC[pt.tag]||'sk';const srv=pt.serving===pt.player;
    const tLabel=pt.errorType?`${pt.tag} · ${etShort(pt.errorType)}`:pt.tag;

  const lastPlayH=lastPt?(lastPt.isFault?`<div class="lp"><span style="font-size:11px">Last:</span><span style="font-size:13px;font-weight:600;color:${lastPt.serving===0?'var(--ac)':'var(--blue)'}">${e(lastPt.serving===0?S.player1:S.player2)}</span><span class="tb2 df" style="font-size:10px;padding:2px 9px;display:inline-block">1st fault</span></div>`:`<div class="lp"><span style="font-size:11px">Last:</span><span style="font-size:13px;font-weight:600;color:${lastPt.player===0?'var(--ac)':'var(--blue)'}">${e(lastPt.player===0?S.player1:S.player2)}</span><span class="tb2 ${TC[lastPt.tag]||'sk'}" style="font-size:10px;padding:2px 9px;display:inline-block">${lastPt.errorType?lastPt.tag+' · '+etShort(lastPt.errorType):lastPt.tag}</span></div>`):'';

  app.innerHTML=`<div id="loading" class="hidden"></div>${titleHtml()}${tabsHtml()}
    ${viewTab==='live'?`<div class="tac" style="margin-bottom:16px">${statusH}${!isAdmin?scorerBadge():''}</div>${ctxL?`<div style="text-align:center;font-size:11px;color:var(--t3);margin-bottom:10px;margin-top:-8px">${ctxL}</div>`:''}<div class="card"><div class="sh" style="grid-template-columns:${gc}"><div style="font-size:11px;color:var(--t3);font-weight:600;letter-spacing:1px">${fL} · ${S.gamesPerSet}g · ${scL}${t3}</div>${cH}<div style="text-align:center;font-size:10px;color:var(--t2);font-weight:700;letter-spacing:1.5px">${ptL}</div></div>${rows}${wtnRow}${lastPlayH}</div>${adm}`:''}
    ${viewTab==='pbp'?pbpHtml():''}
    ${viewTab==='stats'?statsTabHtml():''}
    ${viewTab==='history'?histList():''}
    ${viewTab==='settings'?settingsHtml():''}
    ${viewTab==='admin'&&currentUser&&currentUser.email===ADMIN_EMAIL?adminHtml():''}
    ${modeToggle()}
    ${pendingPoint!==null?(pendingErrorTag!==null?`<div class="ov"><div class="ob"><div style="font-size:18px;font-weight:700;margin-bottom:4px">What type of shot?</div><div style="font-size:13px;color:var(--t2);margin-bottom:16px">${pendingErrorTag} by <strong style="color:${pendingPoint.player===0?'var(--blue)':'var(--ac)'}">${e(pendingPoint.player===0?S.player2:S.player1)}</strong></div><div class="tg">${["Forehand","Backhand","Volley","Overhead","Other"].map(et=>`<button class="tb2 er" onclick="cspError('${et}');render()">${et}</button>`).join('')}</div><div class="flex g10" style="margin-top:12px"><button class="sm" style="flex:1" onclick="pendingErrorTag=null;render()">← BACK</button><button class="sm d" style="flex:1" onclick="pendingPoint=null;pendingErrorTag=null;render()">CANCEL</button></div></div></div>`:`<div class="ov"><div class="ob"><div style="font-size:18px;font-weight:700;margin-bottom:4px">How was the point won?</div><div style="font-size:13px;color:var(--t2);margin-bottom:4px">Point for <strong style="color:var(--ac)">${e(pendingPoint.player===0?S.player1:S.player2)}</strong></div><div class="tg">${getTagsFor(pendingPoint.player).map(t=>`<button class="tb2 ${TC[t]||''}" onclick="csp('${t}');render()">${t}</button>`).join('')}</div><button class="sm" style="width:100%;margin-top:8px" onclick="pendingPoint=null;pendingErrorTag=null;render()">CANCEL</button></div></div>`):''}
    ${confirmReset?`<div class="ov" onclick="confirmReset=false;render()"><div class="ob" onclick="event.stopPropagation()"><div style="font-size:18px;font-weight:700;margin-bottom:8px">Reset Match?</div><div style="font-size:14px;color:var(--t2);margin-bottom:22px">This will clear all scores and return to setup.</div><div class="flex g10"><button class="sm" style="flex:1" onclick="event.stopPropagation();confirmReset=false;render()">CANCEL</button><button class="sm d" style="flex:1" onclick="event.stopPropagation();doReset()">RESET</button></div></div></div>`:''}
    ${confirmFinalize?`<div class="ov" onclick="confirmFinalize=false;render()"><div class="ob" onclick="event.stopPropagation()"><div style="font-size:18px;font-weight:700;margin-bottom:8px">Save Match?</div><div style="font-size:14px;color:var(--t2);margin-bottom:22px">This will save the match to history and start a new one.</div><div class="flex g10"><button class="sm" style="flex:1" onclick="event.stopPropagation();confirmFinalize=false;render()">CANCEL</button><button class="sm" style="flex:1;border-color:var(--brd-a);color:var(--ac)" onclick="event.stopPropagation();doFinalize()">SAVE</button></div></div></div>`:''}
    ${confirmDeleteKey?`<div class="ov" onclick="confirmDeleteKey=null;render()"><div class="ob" onclick="event.stopPropagation()"><div style="font-size:18px;font-weight:700;margin-bottom:8px">Delete Match?</div><div style="font-size:14px;color:var(--t2);margin-bottom:22px">This cannot be undone.</div><div class="flex g10"><button class="sm" style="flex:1" onclick="event.stopPropagation();confirmDeleteKey=null;render()">CANCEL</button><button class="sm d" style="flex:1" onclick="event.stopPropagation();doDel()">DELETE</button></div></div></div>`:''}`
}

function syncN(){
  const p1=document.getElementById('ip1'),p2=document.getElementById('ip2');
  if(p1)S.player1=p1.value||'Austin';if(p2)S.player2=p2.value||'Opponent';
  const loc=document.getElementById('iloc');if(loc)S.location=loc.value.trim();
  const w1=document.getElementById('iwtn1'),w2=document.getElementById('iwtn2');
  if(w1)S.p1Wtn=w1.value.trim();if(w2)S.p2Wtn=w2.value.trim();
  if(S.p1Wtn)try{localStorage.setItem('atP1Wtn',S.p1Wtn)}catch(e){}
}
</script>
</body>
