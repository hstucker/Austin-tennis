name: Deploy Firebase Hosting & Database Rules

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "firebase.json"
      - "database.rules.json"
      - "firebase-messaging-sw.js"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting,database --non-interactive --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
